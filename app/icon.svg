<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" role="img" aria-label="Viralynz">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e0933"/>
      <stop offset="100%" stop-color="#080612"/>
    </linearGradient>
    <linearGradient id="vl" x1="5" y1="6" x2="35" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f0abfc"/>
      <stop offset="40%"  stop-color="#e879f9"/>
      <stop offset="75%"  stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="vr" x1="35" y1="6" x2="5" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f0abfc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <radialGradient id="sp" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#f0abfc" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e879f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="gf" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fond arrondi dark -->
  <rect width="40" height="40" rx="10" fill="url(#bg)"/>
  <!-- Teinture intérieure -->
  <rect width="40" height="40" rx="10" fill="url(#vl)" opacity="0.09"/>
  <!-- Bordure fine -->
  <rect x="0.75" y="0.75" width="38.5" height="38.5" rx="9.5"
    stroke="url(#vl)" stroke-opacity="0.28" stroke-width="1.5"/>

  <!-- Bras gauche du V (déclin → creux) -->
  <path d="M7.5 10 L13.5 10 L21 27 L19 27 Z" fill="url(#vl)"/>

  <!-- Bras droit du V (remontée virale, légèrement plus haut) -->
  <path d="M32.5 7 L26.5 7 L21 27 L23 27 Z" fill="url(#vr)" opacity="0.92"/>

  <!-- Éclat lumineux au creux du V -->
  <circle cx="21" cy="27.5" r="2.6" fill="url(#sp)" filter="url(#gf)"/>

  <!-- Sommet viral (haut du bras droit) -->
  <circle cx="32.5" cy="7" r="1.8" fill="#f0abfc" opacity="0.7"/>
</svg>
